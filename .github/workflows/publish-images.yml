name: Publish benchmark images

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [cpu, cuda]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/nilmbench
          tags: |
            type=raw,value=${{ matrix.target }}
            type=sha,prefix=${{ matrix.target }}-
            type=semver,pattern={{version}},suffix=-${{ matrix.target }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.target }}
          build-contexts: |
            contrib=https://github.com/nilmtk/nilmtk-contrib.git#5767286078f5853a2ef1d6f431eb95a1c47ba4e8
          build-args: |
            SOURCE_REVISION=${{ github.sha }}
            NILMTK_CONTRIB_REVISION=5767286078f5853a2ef1d6f431eb95a1c47ba4e8
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          provenance: mode=max
          sbom: true
