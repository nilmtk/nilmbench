# Corrected REDD T1 uses 29 complete training days followed by a seven-day
# holdout inside the actual 2011-04-18 to 2011-05-24 data envelope.
[[task]]
id = "corrected-t1-redd"
family = "T1"
target_data_access = "not_applicable"
profile = "corrected"
shared_meter_policy = "warn"
metric_policy = "paper-appliance-thresholds"
description = "REDD building 1 with an explicit 29-day train / 7-day test split"
sample_period = 60
appliances = ["fridge", "washing machine", "microwave", "dish washer"]
coverage_policy = "strict"
alignment_policy = "per_appliance"
train = [{ dataset = "REDD", building = 1, start = "2011-04-18 10:00:00", end = "2011-05-17 10:00:00" }]
test = [{ dataset = "REDD", building = 1, start = "2011-05-17 10:00:00", end = "2011-05-24 10:00:00" }]

