# Historical profiles reproduce the recovered executed notebooks, including their
# date choices and appliance labels. They warn on silent data truncation.

[[task]]
id = "historical-t1-redd"
family = "T1"
target_data_access = "not_applicable"
profile = "historical"
shared_meter_policy = "allow"
metric_policy = "legacy-nilmtk-10w"
description = "Within REDD building 1 (recovered notebook protocol)"
sample_period = 60
appliances = ["fridge", "washing machine", "microwave", "dish washer"]
coverage_policy = "warn"
alignment_policy = "joint"
train = [{ dataset = "REDD", building = 1, start = "2011-04-01", end = "2011-04-30" }]
test = [{ dataset = "REDD", building = 1, start = "2011-05-01", end = "2011-05-07" }]

